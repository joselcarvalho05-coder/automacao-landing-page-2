<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Obrigado pelo contato — Axen Partners</title>
<meta property="og:title" content="Obrigado pelo contato — Axen Partners">
<meta property="og:description" content="Entraremos em contato pelo WhatsApp em até 5 minutos.">
<link rel="icon" type="image/png" href="/favicon-dark.png" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/png" href="/favicon-light.png" media="(prefers-color-scheme: light)">
<link rel="preconnect" href="https://api.fontshare.com">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap">
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px clamp(20px, 5vw, 56px);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: fadeIn 0.5s var(--ease-out) 0s forwards;
  }

  .logo {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.22em;
    color: var(--fg);
    text-decoration: none;
  }

  .back-link {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--fg-muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color var(--dur-base) var(--ease-out);
  }
  .back-link:hover { color: var(--accent); }
  .back-link svg { transition: transform var(--dur-base) var(--ease-out); }
  .back-link:hover svg { transform: translateX(-3px); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    padding: 48px 0;
  }

  .check {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent-tint);
    border: 1px solid var(--border-cyan);
    display: grid;
    place-items: center;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeIn 0.5s var(--ease-out) 0.1s forwards;
  }
  .check svg {
    width: 18px;
    height: 18px;
    stroke: var(--accent);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 24;
    stroke-dashoffset: 24;
    animation: draw 0.6s var(--ease-out) 0.5s forwards;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(34px, 4.5vw, 52px);
    line-height: 1.1;
    letter-spacing: -0.015em;
    color: var(--fg);
    margin-bottom: 20px;
    opacity: 0;
    animation: rise 0.6s var(--ease-out) 0.2s forwards;
  }
  h1 span { color: var(--fg-faint); display: block; }

  .lead {
    font-family: var(--font-body);
    font-size: clamp(15px, 1.2vw, 17px);
    line-height: 1.6;
    color: var(--fg-muted);
    max-width: 520px;
    opacity: 0;
    animation: rise 0.6s var(--ease-out) 0.3s forwards;
  }
  .lead strong { color: var(--fg); font-weight: 600; }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-delay: 0s !important;
    }
    .check svg { stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
  <div class="page">
    <header>
      <a href="/" class="logo">AXEN</a>
      <a href="/" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Voltar pro site
      </a>
    </header>

    <main>
      <div class="check" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
      </div>
      <h1>Obrigado pelo contato<span id="nome-display">.</span></h1>
      <p class="lead">
        Entraremos em contato pelo WhatsApp em até <strong>5 minutos</strong>.
      </p>
    </main>
  </div>

  <script>
    (function () {
      try {
        var nome = localStorage.getItem('axen_lead_nome');
        if (nome) {
          var first = String(nome).trim().split(/\s+/)[0];
          if (first) {
            first = first.charAt(0).toUpperCase() + first.slice(1).toLowerCase();
            var el = document.getElementById('nome-display');
            if (el) el.textContent = ', ' + first + '.';
          }
        }
      } catch (e) { /* localStorage blocked — skip personalization */ }
    })();
  </script>
</body>
</html>
